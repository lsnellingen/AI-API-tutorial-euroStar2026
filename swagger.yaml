openapi: 3.0.3
info:
  title: E-Commerce REST API
  description: |
    In-memory e-commerce REST API with JWT authentication and checkout.

    **Checkout rules:**
    - Only authenticated users can checkout
    - Payment methods: `cash` or `credit_card`
    - Cash payments receive a 10% discount on the subtotal
  version: 1.0.0
  contact:
    name: API Support

servers:
  - url: http://localhost:3000/api
    description: Local development server

tags:
  - name: Health
    description: API health monitoring
  - name: Auth
    description: User registration and authentication
  - name: Checkout
    description: Order checkout (requires authentication)

paths:
  /healthcheck:
    get:
      tags:
        - Health
      summary: Healthcheck
      description: Returns the current health status of the API.
      operationId: healthcheck
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok
                timestamp: '2026-06-15T10:00:00.000Z'

  /register:
    post:
      tags:
        - Auth
      summary: Register a new user
      description: Creates a new user account and returns a JWT token.
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              username: dave
              email: dave@example.com
              password: mypassword
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid request or duplicate username/email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingFields:
                  value:
                    error: Username, email, and password are required
                duplicateUsername:
                  value:
                    error: Username already exists

  /login:
    post:
      tags:
        - Auth
      summary: Login
      description: Authenticates a user and returns a JWT token.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              username: alice
              password: password123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Invalid username or password

  /checkout:
    post:
      tags:
        - Checkout
      summary: Checkout
      description: |
        Places an order for one or more products. Requires a valid JWT Bearer token.

        - `cash` payment applies a 10% discount on the subtotal
        - `credit_card` payment has no discount
      operationId: checkout
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
            examples:
              cashPayment:
                summary: Cash payment with discount
                value:
                  items:
                    - productId: 1
                      quantity: 1
                    - productId: 3
                      quantity: 2
                  paymentMethod: cash
              creditCardPayment:
                summary: Credit card payment
                value:
                  items:
                    - productId: 2
                      quantity: 1
                  paymentMethod: credit_card
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutResponse'
        '400':
          description: Invalid request, payment method, or insufficient stock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidPayment:
                  value:
                    error: Payment method must be "cash" or "credit_card"
                noItems:
                  value:
                    error: At least one item is required
        '401':
          description: Missing, invalid, or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingToken:
                  value:
                    error: Authentication required. Provide a valid Bearer token.
                invalidToken:
                  value:
                    error: Invalid or expired token
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Product with id 99 not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /login or /register

  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - timestamp
      properties:
        status:
          type: string
          example: ok
        timestamp:
          type: string
          format: date-time
          example: '2026-06-15T10:00:00.000Z'

    RegisterRequest:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          example: dave
        email:
          type: string
          format: email
          example: dave@example.com
        password:
          type: string
          format: password
          example: mypassword

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: alice
        password:
          type: string
          format: password
          example: password123

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: alice
        email:
          type: string
          format: email
          example: alice@example.com

    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    CheckoutItemRequest:
      type: object
      required:
        - productId
        - quantity
      properties:
        productId:
          type: integer
          example: 1
        quantity:
          type: integer
          minimum: 1
          example: 2

    CheckoutRequest:
      type: object
      required:
        - items
        - paymentMethod
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CheckoutItemRequest'
        paymentMethod:
          type: string
          enum:
            - cash
            - credit_card
          example: cash

    OrderItem:
      type: object
      properties:
        productId:
          type: integer
          example: 1
        name:
          type: string
          example: Wireless Headphones
        unitPrice:
          type: number
          format: float
          example: 149.99
        quantity:
          type: integer
          example: 1
        lineTotal:
          type: number
          format: float
          example: 149.99

    CheckoutResponse:
      type: object
      properties:
        orderId:
          type: integer
          example: 1718445600000
        userId:
          type: integer
          example: 1
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        paymentMethod:
          type: string
          enum:
            - cash
            - credit_card
          example: cash
        subtotal:
          type: number
          format: float
          example: 249.97
        discount:
          type: number
          format: float
          example: 25
        discountRate:
          type: number
          format: float
          example: 0.1
        total:
          type: number
          format: float
          example: 224.97

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Invalid username or password
